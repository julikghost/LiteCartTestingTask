name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Demo credentials from the assignment (public in the task brief).
# To override: Settings → Secrets → TEST_USER_EMAIL / TEST_USER_PASSWORD / TEST_INVALID_PASSWORD
# and replace the values below with ${{ secrets.TEST_USER_* }}.
env:
  CI: true
  TEST_USER_EMAIL: test@test.com
  TEST_USER_PASSWORD: '1234567890'
  TEST_INVALID_PASSWORD: wrong-password-123

jobs:
  chromium:
    name: Chromium + Allure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run E2E (Chromium)
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-chromium
          path: |
            allure-report/
            allure-history/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test traces / videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-chromium
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

  cross-browser:
    name: Firefox + WebKit
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: chromium

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps firefox webkit

      - name: Run E2E (Firefox + WebKit)
        run: npm run test:cross:ci

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-cross
          path: |
            allure-report/
            allure-history/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test traces / videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cross
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
