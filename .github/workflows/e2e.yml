name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  BASE_URL: https://litecart.stqa.ru/en/
  TEST_USER_EMAIL: test@test.com
  TEST_USER_PASSWORD: '1234567890'
  TEST_INVALID_PASSWORD: wrong-password-123

jobs:
  chromium:
    name: Chromium + Allure
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java (Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run E2E (Chromium)
        run: npx playwright test --project=chromium

      - name: Generate Allure report
        if: always()
        run: |
          set -euo pipefail
          java -version
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "allure-results files: $(find allure-results -type f | wc -l)"
          ls -la allure-results | head -n 30
          # --single-file: отчёт открывается из артефакта без локального сервера
          npx allure generate ./allure-results --clean --single-file -o ./allure-report
          test -f allure-report/index.html
          ls -lah allure-report/index.html

      - name: Upload Allure report (single-file HTML)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-report-chromium
          path: allure-report/index.html
          retention-days: 14
          if-no-files-found: error

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: allure-results-chromium
          path: allure-results/
          retention-days: 14
          if-no-files-found: error

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload test traces / videos
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-chromium
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore
